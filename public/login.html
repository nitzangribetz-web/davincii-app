<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Davincii</title>
<script>if(/iPhone|iPad|iPod|Android|webOS|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)){window.location.replace('/#login');}</script>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20viewBox%3D%220%200%2032%2032%22%3E%3Crect%20width%3D%2232%22%20height%3D%2232%22%20fill%3D%22%23fff%22/%3E%3Ctext%20x%3D%223%22%20y%3D%2228%22%20font-family%3D%22Georgia%2Cserif%22%20font-style%3D%22italic%22%20font-size%3D%2230%22%20fill%3D%22%23080808%22%3ED%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=DM+Sans:wght@300;400;500;600&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; }
body { font-family:'DM Sans', system-ui, sans-serif; background:#fff; }

.auth-layout {
  display: grid;
  grid-template-columns: 440px 1fr;
  min-height: 100vh;
}
@media (max-width:768px) {
  .auth-layout { grid-template-columns:1fr; }
  .auth-brand { display:none; }
  .auth-form-panel { padding:40px 24px; }
}

/* Left — blue brand panel */
.auth-brand {
  position: relative;
  background: radial-gradient(ellipse 140% 120% at 20% 0%, #0E2A78 0%, #0A2060 40%, #060E28 80%, #030810 100%);
  display: flex; flex-direction: column;
  justify-content: space-between;
  padding: 40px 48px 52px;
  overflow: hidden;
}
.auth-brand-glow {
  position: absolute;
  width: 500px; height: 400px;
  border-radius: 50%;
  background: radial-gradient(ellipse, rgba(50,110,240,0.45) 0%, rgba(32,80,200,0.18) 50%, transparent 78%);
  top: 35%; left: 50%; transform: translate(-50%, -50%);
  filter: blur(42px); pointer-events: none; z-index: 0;
}
.auth-brand-top { position: relative; z-index: 1; display: flex; align-items: center; justify-content: space-between; }
.auth-brand-logo img { height: 22px; display: block; }
.auth-brand-back {
  font-family: 'DM Sans', sans-serif;
  font-size: 12px; font-weight: 400;
  color: rgba(255,255,255,0.45); background: none; border: none;
  cursor: pointer; letter-spacing: 0.02em;
  transition: color 0.18s; text-decoration: none;
}
.auth-brand-back:hover { color: rgba(255,255,255,0.80); }
.auth-brand-bottom { position: relative; z-index: 1; }
.auth-brand-rule {
  width: 28px; height: 1px;
  background: rgba(255,255,255,0.35);
  margin-bottom: 24px;
}
.auth-brand-tagline {
  font-family: 'Playfair Display', serif;
  font-weight: 300;
  font-size: clamp(32px, 3vw, 46px);
  line-height: 1.08; letter-spacing: -0.025em;
  color: #fff; margin-bottom: 18px;
}
.auth-brand-tagline em { font-style: italic; color: rgba(255,255,255,0.60); }
.auth-brand-sub {
  font-family: 'DM Sans', sans-serif;
  font-size: 13.5px; font-weight: 300;
  color: rgba(255,255,255,0.42); line-height: 1.78;
  max-width: 300px;
}

/* Right — white form panel */
.auth-form-panel {
  background: #fff;
  display: flex; align-items: center; justify-content: center;
  padding: 48px 40px;
}
.auth-form-inner { width: 100%; max-width: 400px; }

.auth-page-title {
  font-family: 'Playfair Display', serif;
  font-weight: 300;
  font-size: clamp(30px, 3vw, 42px);
  letter-spacing: -0.025em; line-height: 1.08;
  color: #0A0A0A; margin-bottom: 32px;
}
.auth-page-title em { font-style: italic; color: #0A0A0A; }

.auth-field {
  display: block; width: 100%;
  padding: 13px 16px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px; font-weight: 300; color: #0A0A0A;
  background: #F8FAFC; border: 1px solid #E2E8F0;
  outline: none; margin-bottom: 12px;
  border-radius: 6px;
  -webkit-appearance: none;
  transition: border-color 0.18s, box-shadow 0.18s;
}
.auth-field:focus {
  border-color: #3B82F6;
  box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
}
.auth-field::placeholder { color: #64748B; }

.auth-btn-primary {
  display: block; width: 100%;
  padding: 14px 20px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px; font-weight: 600;
  color: #fff; background: #2260CC;
  border: none; border-radius: 8px; cursor: pointer;
  margin-bottom: 12px; letter-spacing: 0.01em;
  transition: background 0.18s, transform 0.12s;
}
.auth-btn-primary:hover { background: #1A52B8; }
.auth-btn-primary:active { transform: scale(0.99); }

.auth-btn-social {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%; padding: 13px 20px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13.5px; font-weight: 400; color: #374151;
  background: #fff; border: 1px solid #E2E8F0;
  border-radius: 8px; cursor: pointer; margin-bottom: 12px;
  transition: border-color 0.18s, box-shadow 0.18s;
  text-decoration: none;
}
.auth-btn-social:hover { border-color: #CBD5E1; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.auth-social-icon { width: 18px; height: 18px; flex-shrink: 0; }

.auth-forgot-link {
  font-family: 'DM Sans', sans-serif;
  font-size: 12px; color: #94A3B8; background: none; border: none;
  cursor: pointer; padding: 0 0 16px; display: block;
  transition: color 0.18s; text-decoration: none;
}
.auth-forgot-link:hover { color: #3B82F6; }

.error-box {
  background: rgba(239,68,68,0.06); border-left: 2px solid #EF4444;
  padding: 11px 14px; margin-bottom: 16px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px; color: #DC2626; display: none;
}
.error-box.visible { display: block; }

.auth-footer-link {
  font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 300; color: #64748B; text-align: center;
  margin-top: 18px;
}
.auth-footer-link a { color: #2563EB; font-weight: 500; cursor: pointer; text-decoration: none; }
.auth-footer-link a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="auth-layout">
  <div class="auth-brand">
    <div class="auth-brand-glow"></div>
    <div class="auth-brand-top">
      <a href="/"><img src="/logo-white-sm.png" alt="Davincii" class="auth-brand-logo" style="height:22px"></a>
      <a class="auth-brand-back" href="/">&larr; Back to site</a>
    </div>
    <div class="auth-brand-bottom">
      <div class="auth-brand-rule"></div>
      <div class="auth-brand-tagline">Every stream,<br>every spin,<br><em>every dollar.</em></div>
      <div class="auth-brand-sub">Music publishing administration built for independent artists. We register your catalog, collect your royalties, and pay you every quarter.</div>
    </div>
  </div>

  <div class="auth-form-panel">
    <div class="auth-form-inner">
      <div class="auth-page-title">Welcome <em>back.</em></div>

      <div class="error-box" id="login-error"></div>

      <form method="POST" action="/api/auth/login" autocomplete="on">
        <input class="auth-field" type="email" name="email" id="login-email"
               autocomplete="email webauthn" placeholder="Email address" required>

        <input class="auth-field" type="password" name="password" id="login-password"
               autocomplete="current-password" placeholder="Password" required>

        <a class="auth-forgot-link" href="/">Recover your account</a>

        <button class="auth-btn-primary" type="submit">Sign in</button>
      </form>

      <a class="auth-btn-social" href="/api/auth/google">
        <svg class="auth-social-icon" viewBox="0 0 18 18"><path d="M17.64 9.205c0-.639-.057-1.252-.164-1.841H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/><path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
        Continue with Google
      </a>

      <button class="auth-btn-social" id="passkey-login-btn" type="button" style="display:none">
        <svg class="auth-social-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/><circle cx="12" cy="16" r="1"/></svg>
        Sign in with a passkey
      </button>

      <div class="auth-footer-link">Don't have an account? <a href="/signup.html">Register now</a></div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/@simplewebauthn/browser/dist/bundle/index.umd.min.js"></script>
<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var error = params.get('error');
  if (error) {
    var el = document.getElementById('login-error');
    el.textContent = error;
    el.classList.add('visible');
    window.history.replaceState({}, '', '/login.html');
  }

  // Show passkey button if WebAuthn is supported
  if (window.PublicKeyCredential) {
    PublicKeyCredential.isConditionalMediationAvailable().then(function(available) {
      document.getElementById('passkey-login-btn').style.display = 'flex';

      // If conditional UI is available, trigger autofill-assisted passkey
      if (available) {
        startConditionalPasskeyLogin();
      }
    }).catch(function() {
      // Fallback: still show button even if conditional mediation check fails
      document.getElementById('passkey-login-btn').style.display = 'flex';
    });
  }

  // Button click: explicit passkey login
  document.getElementById('passkey-login-btn').addEventListener('click', function() {
    startPasskeyLogin(false);
  });

  function showError(msg) {
    var el = document.getElementById('login-error');
    el.textContent = msg;
    el.classList.add('visible');
  }

  function startConditionalPasskeyLogin() {
    startPasskeyLogin(true);
  }

  async function startPasskeyLogin(conditional) {
    try {
      // 1. Get authentication options from server
      var optionsRes = await fetch('/api/passkeys/login/options', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
      });
      if (!optionsRes.ok) return;
      var options = await optionsRes.json();

      // 2. Prompt user for passkey via WebAuthn
      var credential = await SimpleWebAuthnBrowser.startAuthentication({
        optionsJSON: options,
        useBrowserAutofill: conditional,
      });

      // 3. Verify with server
      var verifyRes = await fetch('/api/passkeys/login/verify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(credential),
      });
      var result = await verifyRes.json();

      if (!verifyRes.ok || !result.verified) {
        showError(result.error || 'Passkey authentication failed.');
        return;
      }

      // 4. Store token and redirect (same flow as password/OAuth login)
      localStorage.setItem('dv_token', result.token);
      localStorage.setItem('dv_artist', JSON.stringify(result.artist));
      window.location.href = '/?token=' + encodeURIComponent(result.token) +
        '&artist=' + encodeURIComponent(JSON.stringify(result.artist));
    } catch (err) {
      // User cancelled or WebAuthn error — only show error for non-conditional
      if (!conditional && err.name !== 'AbortError' && err.name !== 'NotAllowedError') {
        showError('Passkey sign-in failed. Please try again.');
      }
    }
  }
})();
</script>
</body>
</html>
