<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Davincii</title>
<script>if(/iPhone|iPad|iPod|Android|webOS|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)){window.location.replace('/#login');}</script>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20viewBox%3D%220%200%2032%2032%22%3E%3Crect%20width%3D%2232%22%20height%3D%2232%22%20fill%3D%22%23fff%22/%3E%3Ctext%20x%3D%223%22%20y%3D%2228%22%20font-family%3D%22Georgia%2Cserif%22%20font-style%3D%22italic%22%20font-size%3D%2230%22%20fill%3D%22%23080808%22%3ED%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Inter:wght@300;400;500;600&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --black: #080808;
  --white: #FFFFFF;
  --red: #B80000;
  --red-soft: rgba(184,0,0,0.07);
  --muted: #555;
  --muted-light: #888;
  --serif: 'Cormorant Garamond', Georgia, serif;
  --sans: 'Inter', system-ui, sans-serif;
  --script: 'Pinyon Script', cursive;
}
html, body { height:100%; }
body { font-family:var(--sans); background:var(--white); }

.auth-layout { display:grid; grid-template-columns:320px 1fr; min-height:100vh; }
@media (max-width:768px) { .auth-layout { grid-template-columns:1fr; } .auth-brand { display:none; } }

.auth-brand {
  background:var(--black); color:var(--white); padding:40px 44px 44px;
  display:flex; flex-direction:column; justify-content:space-between;
  position:relative; overflow:hidden;
}
.auth-brand::before { content:''; position:absolute; inset:0; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); opacity:0.04; pointer-events:none; }
.auth-brand-glow { position:absolute; bottom:-80px; left:-60px; width:500px; height:500px; background:radial-gradient(ellipse, rgba(184,0,0,0.14) 0%, transparent 65%); pointer-events:none; animation:authGlow 10s ease-in-out infinite; }
@keyframes authGlow { 0%,100% { transform:scale(1); opacity:0.7; } 50% { transform:scale(1.15); opacity:1; } }
.auth-brand-top { position:relative; z-index:1; }
.auth-brand-logo img { height:26px; display:block; }
.auth-brand-bottom { position:relative; z-index:1; }
.auth-brand-rule { width:24px; height:2px; background:var(--red); margin-bottom:18px; }
.auth-brand-tagline { font-family:var(--serif); font-size:28px; font-weight:300; color:#fff; line-height:1.22; letter-spacing:-0.01em; margin-bottom:14px; }
.auth-brand-tagline em { font-style:italic; color:rgba(255,255,255,0.45); }
.auth-brand-sub { font-family:var(--sans); font-size:13px; font-weight:300; color:rgba(255,255,255,0.28); line-height:1.7; }

.auth-form-panel { display:flex; align-items:center; justify-content:center; padding:60px 80px; background:#FFFFFF; }
@media (max-width:768px) { .auth-form-panel { padding:40px 24px; } }
.auth-form-inner { width:100%; max-width:400px; }

.auth-page-title { font-family:var(--serif); font-size:44px; font-weight:400; letter-spacing:-0.02em; line-height:1.08; color:var(--black); margin-bottom:36px; }
.auth-page-title em { font-style:italic; }

.auth-field { width:100%; border:1.5px solid rgba(0,0,0,0.12); border-radius:10px; padding:15px 18px; font-family:var(--sans); font-size:15px; font-weight:400; color:var(--black); background:#FFFFFF; outline:none; margin-bottom:12px; -webkit-appearance:none; transition:border-color 0.18s; }
.auth-field:focus { border-color:var(--black); }
.auth-field::placeholder { color:#c0c0c0; }

.auth-btn-primary { width:100%; background:var(--black); color:#fff; border:none; border-radius:10px; padding:16px; font-family:var(--sans); font-size:15px; font-weight:600; cursor:pointer; margin-bottom:12px; transition:opacity 0.18s; }
.auth-btn-primary:hover { opacity:0.82; }

.auth-btn-social { width:100%; background:#f5f5f5; color:var(--black); border:1.5px solid rgba(0,0,0,0.08); border-radius:10px; padding:14px 18px; font-family:var(--sans); font-size:14px; font-weight:500; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:12px; transition:background 0.15s; text-decoration:none; }
.auth-btn-social:hover { background:#ebebeb; }
.auth-social-icon { width:18px; height:18px; flex-shrink:0; }

.auth-forgot-link { font-family:var(--sans); font-size:13px; font-weight:600; color:var(--black); background:none; border:none; cursor:pointer; padding:0; display:block; margin-bottom:18px; text-align:left; text-decoration:none; }

.error-box { background:var(--red-soft); border-left:2px solid var(--red); padding:11px 14px; margin-bottom:16px; font-size:13px; color:var(--red); display:none; }
.error-box.visible { display:block; }

.auth-footer-link { font-family:var(--sans); font-size:13px; font-weight:400; color:rgba(0,0,0,0.45); text-align:center; margin-top:18px; }
.auth-footer-link a { color:var(--black); font-weight:600; text-decoration:none; border-bottom:1px solid rgba(0,0,0,0.3); padding-bottom:1px; }
</style>
</head>
<body>
<div class="auth-layout">
  <div class="auth-brand">
    <div class="auth-brand-glow"></div>
    <div class="auth-brand-top">
      <a href="/"><img src="/logo-white-sm.png" alt="Davincii"></a>
    </div>
    <div class="auth-brand-bottom">
      <div class="auth-brand-rule"></div>
      <div class="auth-brand-tagline">Every stream,<br>every spin,<br><em>every dollar.</em></div>
      <div class="auth-brand-sub">Music publishing administration built for independent artists. We register your catalog, collect your royalties, and pay you every quarter.</div>
    </div>
  </div>

  <div class="auth-form-panel">
    <div class="auth-form-inner">
      <div class="auth-page-title">Welcome <em>back.</em></div>

      <div class="error-box" id="login-error"></div>

      <form method="POST" action="/api/auth/login" autocomplete="on">
        <input class="auth-field" type="email" name="email" id="login-email"
               autocomplete="email" placeholder="Email address" required>

        <input class="auth-field" type="password" name="password" id="login-password"
               autocomplete="current-password" placeholder="Password" required>

        <a class="auth-forgot-link" href="/">Recover your account</a>

        <button class="auth-btn-primary" type="submit">Sign in</button>
      </form>

      <a class="auth-btn-social" href="/api/auth/google">
        <svg class="auth-social-icon" viewBox="0 0 18 18"><path d="M17.64 9.205c0-.639-.057-1.252-.164-1.841H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/><path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
        Continue with Google
      </a>

      <div class="auth-footer-link">Don't have an account? <a href="/signup.html">Register now</a></div>
    </div>
  </div>
</div>

<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var error = params.get('error');
  if (error) {
    var el = document.getElementById('login-error');
    el.textContent = error;
    el.classList.add('visible');
    window.history.replaceState({}, '', '/login.html');
  }
})();
</script>
</body>
</html>
