<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Davincii</title>
<style>
body { margin:0; background:#F0F4FA; display:flex; align-items:center; justify-content:center; min-height:100vh; }
.loader { width:32px; height:32px; border:3px solid #E2E8F0; border-top-color:#2260CC; border-radius:50%; animation:spin 0.6s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>
<div class="loader"></div>
<script>
(function() {
  // Legacy fallback — the primary Google OAuth flow now uses authorization code
  // handled entirely on the backend (GET /api/auth/google/callback).
  // If someone lands here, redirect them to try again.

  var query = new URLSearchParams(window.location.search);
  var code = query.get('code');
  var error = query.get('error') || query.get('error_description');

  if (error) {
    window.location.replace('/login?error=' + encodeURIComponent(error));
    return;
  }

  // If a code arrived here (Supabase PKCE fallback), send to legacy callback
  if (code) {
    window.location.replace('/api/auth/callback?code=' + encodeURIComponent(code));
    return;
  }

  // No code, no useful tokens — redirect to login
  window.location.replace('/login?error=' + encodeURIComponent('Sign-in failed. Please try again.'));
})();
</script>
</body>
</html>
