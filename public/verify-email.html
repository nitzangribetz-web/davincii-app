<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify Email — Davincii</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20viewBox%3D%220%200%2032%2032%22%3E%3Crect%20width%3D%2232%22%20height%3D%2232%22%20fill%3D%22%23fff%22/%3E%3Ctext%20x%3D%223%22%20y%3D%2228%22%20font-family%3D%22Georgia%2Cserif%22%20font-style%3D%22italic%22%20font-size%3D%2230%22%20fill%3D%22%23080808%22%3ED%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=DM+Sans:wght@300;400;500;600&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; }
body { font-family:'DM Sans', system-ui, sans-serif; background:#fff; }

.auth-layout {
  display: grid;
  grid-template-columns: 440px 1fr;
  min-height: 100vh;
}
@media (max-width:768px) {
  .auth-layout { grid-template-columns:1fr; }
  .auth-brand { display:none; }
  .auth-form-panel { padding:40px 24px; }
}

.auth-brand {
  position: relative;
  background: radial-gradient(ellipse 140% 120% at 20% 0%, #0E2A78 0%, #0A2060 40%, #060E28 80%, #030810 100%);
  display: flex; flex-direction: column;
  justify-content: space-between;
  padding: 40px 48px 52px;
  overflow: hidden;
}
.auth-brand-glow {
  position: absolute;
  width: 500px; height: 400px;
  border-radius: 50%;
  background: radial-gradient(ellipse, rgba(50,110,240,0.45) 0%, rgba(32,80,200,0.18) 50%, transparent 78%);
  top: 35%; left: 50%; transform: translate(-50%, -50%);
  filter: blur(42px); pointer-events: none; z-index: 0;
}
.auth-brand-top { position: relative; z-index: 1; display: flex; align-items: center; justify-content: space-between; }
.auth-brand-back {
  font-family: 'DM Sans', sans-serif;
  font-size: 12px; font-weight: 400;
  color: rgba(255,255,255,0.45); background: none; border: none;
  cursor: pointer; letter-spacing: 0.02em;
  transition: color 0.18s; text-decoration: none;
}
.auth-brand-back:hover { color: rgba(255,255,255,0.80); }
.auth-brand-bottom { position: relative; z-index: 1; }
.auth-brand-rule {
  width: 28px; height: 1px;
  background: rgba(255,255,255,0.35);
  margin-bottom: 24px;
}
.auth-brand-tagline {
  font-family: 'Playfair Display', serif;
  font-weight: 300;
  font-size: clamp(32px, 3vw, 46px);
  line-height: 1.08; letter-spacing: -0.025em;
  color: #fff; margin-bottom: 18px;
}
.auth-brand-tagline em { font-style: italic; color: rgba(255,255,255,0.60); }
.auth-brand-sub {
  font-family: 'DM Sans', sans-serif;
  font-size: 13.5px; font-weight: 300;
  color: rgba(255,255,255,0.42); line-height: 1.78;
  max-width: 300px;
}

.auth-form-panel {
  background: #fff;
  display: flex; align-items: center; justify-content: center;
  padding: 48px 40px;
}
.auth-form-inner { width: 100%; max-width: 400px; }

.auth-page-title {
  font-family: 'Playfair Display', serif;
  font-weight: 300;
  font-size: clamp(30px, 3vw, 42px);
  letter-spacing: -0.025em; line-height: 1.08;
  color: #0A0A0A; margin-bottom: 12px;
}
.auth-page-title em { font-style: italic; }

.verify-sub {
  font-size: 13.5px; font-weight: 300;
  color: #64748B; line-height: 1.7;
  margin-bottom: 28px;
}
.verify-sub strong { font-weight: 500; color: #0A0A0A; }

.auth-field {
  display: block; width: 100%;
  padding: 16px;
  font-family: 'DM Sans', sans-serif;
  font-size: 28px; font-weight: 500; color: #0A0A0A;
  text-align: center; letter-spacing: 0.35em;
  background: #F8FAFC; border: 1px solid #E2E8F0;
  outline: none; margin-bottom: 16px;
  border-radius: 6px;
  -webkit-appearance: none;
  transition: border-color 0.18s, box-shadow 0.18s;
}
.auth-field:focus {
  border-color: #3B82F6;
  box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
}
.auth-field::placeholder {
  color: #CBD5E1; font-size: 28px; letter-spacing: 0.35em;
}

.auth-btn-primary {
  display: block; width: 100%;
  padding: 14px 20px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px; font-weight: 600;
  color: #fff; background: #2260CC;
  border: none; border-radius: 8px; cursor: pointer;
  margin-bottom: 16px; letter-spacing: 0.01em;
  transition: background 0.18s, transform 0.12s;
}
.auth-btn-primary:hover { background: #1A52B8; }
.auth-btn-primary:active { transform: scale(0.99); }

.error-box {
  background: rgba(239,68,68,0.06); border-left: 2px solid #EF4444;
  padding: 11px 14px; margin-bottom: 16px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px; color: #DC2626; display: none;
}
.error-box.visible { display: block; }

.resend-row {
  text-align: center;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 300; color: #64748B;
  margin-bottom: 12px;
}
.resend-btn {
  background: none; border: none; cursor: pointer;
  color: #2563EB; font-weight: 500; font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  transition: color 0.18s;
}
.resend-btn:hover { text-decoration: underline; }
.resend-btn:disabled { color: #94A3B8; cursor: default; text-decoration: none; }

.auth-footer-link {
  font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 300; color: #64748B; text-align: center;
  margin-top: 8px;
}
.auth-footer-link a { color: #2563EB; font-weight: 500; cursor: pointer; text-decoration: none; }
.auth-footer-link a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="auth-layout">
  <div class="auth-brand">
    <div class="auth-brand-glow"></div>
    <div class="auth-brand-top">
      <a href="/"><img src="/logo-white-sm.png" alt="Davincii" style="height:26px"></a>
      <a class="auth-brand-back" href="/">&larr; Back to site</a>
    </div>
    <div class="auth-brand-bottom">
      <div class="auth-brand-rule"></div>
      <div class="auth-brand-tagline">Almost<br><em>there.</em></div>
      <div class="auth-brand-sub">Verify your email to complete your registration and start collecting royalties.</div>
    </div>
  </div>

  <div class="auth-form-panel">
    <div class="auth-form-inner">
      <div class="auth-page-title">Verify your <em>email.</em></div>
      <div class="verify-sub">We sent a 6-digit code to <strong id="verify-email-display"></strong>. Check your inbox and enter it below.</div>

      <div class="error-box" id="verify-error"></div>

      <form method="POST" action="/api/auth/verify-email">
        <input type="hidden" name="email" id="verify-email-hidden">

        <input class="auth-field" type="text" name="code" id="verify-code"
               inputmode="numeric" pattern="[0-9]{6}" maxlength="6"
               autocomplete="one-time-code" placeholder="------" required>

        <button class="auth-btn-primary" type="submit">Verify</button>
      </form>

      <div class="resend-row">
        Didn't receive a code?
        <button class="resend-btn" id="resend-btn" onclick="resendCode()">Resend code</button>
        <span id="resend-timer" style="display:none"></span>
      </div>

      <div class="auth-footer-link">Wrong email? <a href="/signup.html">Start over</a></div>
    </div>
  </div>
</div>

<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var email = params.get('email') || '';

  // Populate email display and hidden field
  document.getElementById('verify-email-display').textContent = email;
  document.getElementById('verify-email-hidden').value = email;

  // Show error from URL
  var error = params.get('error');
  if (error) {
    var el = document.getElementById('verify-error');
    el.textContent = error;
    el.classList.add('visible');
    window.history.replaceState({}, '', '/verify-email.html?email=' + encodeURIComponent(email));
  }

  // Auto-focus code input
  var codeInput = document.getElementById('verify-code');
  codeInput.focus();

  // Auto-submit when 6 digits entered
  codeInput.addEventListener('input', function() {
    this.value = this.value.replace(/[^0-9]/g, '').slice(0, 6);
    if (this.value.length === 6) {
      this.closest('form').submit();
    }
  });
})();

var _resendCooldown = 0;
function resendCode() {
  var email = document.getElementById('verify-email-hidden').value;
  var btn = document.getElementById('resend-btn');
  var timer = document.getElementById('resend-timer');

  btn.disabled = true;
  btn.style.display = 'none';

  fetch('/api/auth/resend-verification', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email: email })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.error) {
      var el = document.getElementById('verify-error');
      el.textContent = data.error;
      el.classList.add('visible');
      btn.style.display = '';
      btn.disabled = false;
      return;
    }
    // Start 60s countdown
    _resendCooldown = 60;
    timer.style.display = '';
    timer.textContent = 'Resend in ' + _resendCooldown + 's';
    var iv = setInterval(function() {
      _resendCooldown--;
      if (_resendCooldown <= 0) {
        clearInterval(iv);
        timer.style.display = 'none';
        btn.style.display = '';
        btn.disabled = false;
      } else {
        timer.textContent = 'Resend in ' + _resendCooldown + 's';
      }
    }, 1000);
  })
  .catch(function() {
    btn.style.display = '';
    btn.disabled = false;
  });
}
</script>
</body>
</html>
