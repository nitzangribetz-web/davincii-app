<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account — Davincii</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20viewBox%3D%220%200%2032%2032%22%3E%3Crect%20width%3D%2232%22%20height%3D%2232%22%20fill%3D%22%23fff%22/%3E%3Ctext%20x%3D%223%22%20y%3D%2228%22%20font-family%3D%22Georgia%2Cserif%22%20font-style%3D%22italic%22%20font-size%3D%2230%22%20fill%3D%22%23080808%22%3ED%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Inter:wght@300;400;500;600&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --black: #080808;
  --white: #FFFFFF;
  --red: #B80000;
  --red-soft: rgba(184,0,0,0.07);
  --muted: #555;
  --muted-light: #888;
  --serif: 'Cormorant Garamond', Georgia, serif;
  --sans: 'Inter', system-ui, sans-serif;
  --script: 'Pinyon Script', cursive;
}
html, body { height:100%; }
body { font-family:var(--sans); background:var(--white); }

.auth-layout { display:grid; grid-template-columns:300px 1fr; min-height:100vh; }
@media (max-width:768px) { .auth-layout { grid-template-columns:1fr; } .auth-brand { display:none; } }

.auth-brand {
  background:var(--black); color:var(--white); padding:48px 36px;
  display:flex; flex-direction:column; justify-content:space-between;
  position:relative; overflow:hidden;
}
.auth-brand-logo img { height:26px; display:block; }
.auth-brand-rule { width:24px; height:2px; background:var(--red); margin-bottom:20px; }
.auth-brand-tagline { font-family:var(--serif); font-size:clamp(28px,2.5vw,38px); font-weight:300; color:var(--white); line-height:1.22; letter-spacing:-0.01em; margin-bottom:20px; }
.auth-brand-tagline em { font-style:italic; color:rgba(255,255,255,0.6); }
.auth-brand-sub { font-family:var(--sans); font-size:13px; font-weight:300; color:rgba(255,255,255,0.4); line-height:1.72; }
.auth-brand-footer { font-family:var(--sans); font-size:10px; font-weight:400; letter-spacing:0.10em; text-transform:uppercase; color:rgba(255,255,255,0.18); }

.auth-form-panel { display:flex; align-items:flex-start; justify-content:center; padding:60px 64px; background:var(--white); overflow-y:auto; }
@media (max-width:768px) { .auth-form-panel { padding:40px 24px; } }
.auth-form-inner { width:100%; max-width:420px; }

/* Steps */
.steps { display:flex; align-items:center; gap:0; margin-bottom:36px; }
.step { display:flex; align-items:center; gap:8px; }
.step-num { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:var(--sans); font-size:12px; font-weight:600; }
.step-num.active { background:var(--black); color:var(--white); }
.step-num.inactive { background:transparent; border:1.5px solid #ccc; color:#aaa; }
.step-label { font-family:var(--sans); font-size:10px; font-weight:600; letter-spacing:0.10em; text-transform:uppercase; }
.step-label.active { color:var(--black); }
.step-label.inactive { color:#aaa; }
.step-line { width:48px; height:1px; background:#ddd; margin:0 12px; }

.auth-form-title { font-family:var(--serif); font-size:44px; font-weight:400; letter-spacing:-0.02em; line-height:1.08; margin-bottom:8px; color:var(--black); }
.auth-form-title em { font-style:italic; }
.auth-title-rule { width:24px; height:2px; background:var(--red); margin-bottom:16px; }
.auth-form-sub { font-family:var(--sans); font-size:14px; font-weight:300; color:var(--muted); margin-bottom:32px; line-height:1.65; }

.field-label { font-family:var(--sans); font-size:10px; font-weight:600; letter-spacing:0.13em; text-transform:uppercase; color:#2a2a2a; margin-bottom:7px; display:block; }
.field { width:100%; border:1px solid rgba(0,0,0,0.16); padding:13px 16px; font-family:var(--sans); font-size:15px; font-weight:400; color:var(--black); background:transparent; outline:none; margin-bottom:18px; transition:border-color 0.18s; border-radius:0; -webkit-appearance:none; }
.field:focus { border-color:var(--red); }
.field::placeholder { color:#c0c0c0; }
.field-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.field-row .field { margin-bottom:18px; }

.btn-primary { width:100%; background:var(--black); color:var(--white); border:none; padding:15px 32px; font-family:var(--sans); font-size:12px; font-weight:600; letter-spacing:0.14em; text-transform:uppercase; cursor:pointer; transition:background 0.18s; }
.btn-primary:hover { background:#222; }

.error-box { background:var(--red-soft); border-left:2px solid var(--red); padding:11px 14px; margin-bottom:16px; font-size:13px; color:var(--red); display:none; }
.error-box.visible { display:block; }

.auth-link { font-family:var(--sans); font-size:13px; color:var(--muted); text-align:center; margin-top:24px; line-height:1.6; }
.auth-link a { color:var(--black); font-weight:500; text-decoration:underline; cursor:pointer; }

.auth-divider { display:flex; align-items:center; gap:14px; margin:24px 0; }
.auth-divider::before, .auth-divider::after { content:''; flex:1; height:1px; background:rgba(0,0,0,0.10); }
.auth-divider span { font-family:var(--sans); font-size:11px; font-weight:500; letter-spacing:0.08em; text-transform:uppercase; color:var(--muted-light); }

.btn-google { display:flex; align-items:center; justify-content:center; gap:10px; width:100%; border:1px solid rgba(0,0,0,0.16); padding:13px 32px; font-family:var(--sans); font-size:13px; font-weight:500; color:var(--black); background:var(--white); text-decoration:none; cursor:pointer; transition:background 0.18s, border-color 0.18s; }
.btn-google:hover { background:#f5f5f5; border-color:rgba(0,0,0,0.25); }

.tos-check { display:flex; align-items:flex-start; gap:10px; margin-bottom:22px; margin-top:4px; }
.tos-check input[type="checkbox"] { margin-top:3px; width:16px; height:16px; accent-color:var(--black); flex-shrink:0; cursor:pointer; }
.tos-check label { font-family:var(--sans); font-size:12.5px; color:var(--muted); line-height:1.55; cursor:pointer; }
.tos-check label a { color:var(--black); font-weight:500; text-decoration:underline; }
</style>
</head>
<body>
<div class="auth-layout">
  <div class="auth-brand">
    <div class="auth-brand-logo"><img src="/logo-white-sm.png" alt="Davincii"></div>
    <div>
      <div class="auth-brand-rule"></div>
      <h2 class="auth-brand-tagline">Your music<br>earns more<br><em>than you know.</em></h2>
    </div>
    <div class="auth-brand-footer">info@davincii.co</div>
  </div>

  <div class="auth-form-panel">
    <div class="auth-form-inner">

      <h1 class="auth-form-title">Get <em>started.</em></h1>
      <div class="auth-title-rule"></div>
      <p class="auth-form-sub">Create your <u>free</u> account and start collecting royalties worldwide.</p>

      <div class="error-box" id="signup-error"></div>

      <a class="btn-google" href="/api/auth/google">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59a14.5 14.5 0 0 1 0-9.18l-7.98-6.19a24.0 24.0 0 0 0 0 21.56l7.98-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Continue with Google
      </a>

      <div class="auth-divider"><span>or</span></div>

      <!-- Real native form POST — no JS, no preventDefault, no AJAX -->
      <form method="POST" action="/api/auth/signup" autocomplete="on">
        <div class="field-row">
          <div>
            <label class="field-label" for="signup-first">First</label>
            <input class="field" type="text" name="first_name" id="signup-first"
                   autocomplete="given-name" placeholder="First" required>
          </div>
          <div>
            <label class="field-label" for="signup-last">Last</label>
            <input class="field" type="text" name="last_name" id="signup-last"
                   autocomplete="family-name" placeholder="Last" required>
          </div>
        </div>

        <label class="field-label" for="signup-email">Email address</label>
        <input class="field" type="email" name="email" id="signup-email"
               autocomplete="email" placeholder="you@example.com" required>

        <label class="field-label" for="signup-password">Password</label>
        <input class="field" type="password" name="password" id="signup-password"
               autocomplete="new-password" placeholder="Min. 8 characters" required minlength="8">

        <label class="field-label" for="signup-confirm">Confirm password</label>
        <input class="field" type="password" name="confirm_password" id="signup-confirm"
               autocomplete="new-password" placeholder="Repeat your password" required minlength="8">

        <div class="tos-check">
          <input type="checkbox" id="tos-agree" name="tos_agree" required>
          <label for="tos-agree">By creating an account, I agree to Davincii's <a href="/terms.html" target="_blank">Terms of Service</a>.</label>
        </div>

        <button class="btn-primary" type="submit">Continue &rarr;</button>
      </form>

      <div class="auth-link">Already have an account? <a href="/login.html">Sign in</a></div>
    </div>
  </div>
</div>

<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var error = params.get('error');
  if (error) {
    var el = document.getElementById('signup-error');
    el.textContent = error;
    el.classList.add('visible');
    window.history.replaceState({}, '', '/signup.html');
  }

  // Client-side password match check before submit
  var form = document.querySelector('form');
  form.addEventListener('submit', function(e) {
    var pw = document.getElementById('signup-password').value;
    var confirm = document.getElementById('signup-confirm').value;
    if (pw !== confirm) {
      e.preventDefault();
      var el = document.getElementById('signup-error');
      el.textContent = 'Passwords do not match.';
      el.classList.add('visible');
    }
  });
})();
</script>
</body>
</html>
