<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account — Davincii</title>
<script>if(/iPhone|iPad|iPod|Android|webOS|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)){window.location.replace('/#signup');}</script>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20viewBox%3D%220%200%2032%2032%22%3E%3Crect%20width%3D%2232%22%20height%3D%2232%22%20fill%3D%22%23fff%22/%3E%3Ctext%20x%3D%223%22%20y%3D%2228%22%20font-family%3D%22Georgia%2Cserif%22%20font-style%3D%22italic%22%20font-size%3D%2230%22%20fill%3D%22%23080808%22%3ED%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=DM+Sans:wght@300;400;500;600&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; }
body { font-family:'DM Sans', system-ui, sans-serif; background:#fff; }

.auth-layout {
  display: grid;
  grid-template-columns: 440px 1fr;
  min-height: 100vh;
}
@media (max-width:768px) {
  .auth-layout { grid-template-columns:1fr; }
  .auth-brand { display:none; }
  .auth-form-panel { padding:40px 24px; }
}

/* Left — blue brand panel */
.auth-brand {
  position: relative;
  background: radial-gradient(ellipse 140% 120% at 20% 0%, #0E2A78 0%, #0A2060 40%, #060E28 80%, #030810 100%);
  display: flex; flex-direction: column;
  justify-content: space-between;
  padding: 40px 48px 52px;
  overflow: hidden;
}
.auth-brand-glow {
  position: absolute;
  width: 500px; height: 400px;
  border-radius: 50%;
  background: radial-gradient(ellipse, rgba(50,110,240,0.45) 0%, rgba(32,80,200,0.18) 50%, transparent 78%);
  top: 35%; left: 50%; transform: translate(-50%, -50%);
  filter: blur(42px); pointer-events: none; z-index: 0;
}
.auth-brand-top { position: relative; z-index: 1; display: flex; align-items: center; justify-content: space-between; }
.auth-brand-logo img { height: 22px; display: block; }
.auth-brand-back {
  font-family: 'DM Sans', sans-serif;
  font-size: 12px; font-weight: 400;
  color: rgba(255,255,255,0.45); background: none; border: none;
  cursor: pointer; letter-spacing: 0.02em;
  transition: color 0.18s; text-decoration: none;
}
.auth-brand-back:hover { color: rgba(255,255,255,0.80); }
.auth-brand-bottom { position: relative; z-index: 1; }
.auth-brand-rule {
  width: 28px; height: 1px;
  background: rgba(255,255,255,0.35);
  margin-bottom: 24px;
}
.auth-brand-tagline {
  font-family: 'Playfair Display', serif;
  font-weight: 300;
  font-size: clamp(32px, 3vw, 46px);
  line-height: 1.08; letter-spacing: -0.025em;
  color: #fff; margin-bottom: 18px;
}
.auth-brand-tagline em { font-style: italic; color: rgba(255,255,255,0.60); }
.auth-brand-sub {
  font-family: 'DM Sans', sans-serif;
  font-size: 13.5px; font-weight: 300;
  color: rgba(255,255,255,0.42); line-height: 1.78;
  max-width: 300px;
}

/* Right — white form panel */
.auth-form-panel {
  background: #fff;
  display: flex; align-items: center; justify-content: center;
  padding: 48px 40px;
  overflow-y: auto;
}
.auth-form-inner { width: 100%; max-width: 400px; }

.auth-page-title {
  font-family: 'Playfair Display', serif;
  font-weight: 300;
  font-size: clamp(30px, 3vw, 42px);
  letter-spacing: -0.025em; line-height: 1.08;
  color: #0A0A0A; margin-bottom: 32px;
}
.auth-page-title em { font-style: italic; color: #0A0A0A; }

.auth-field {
  display: block; width: 100%;
  padding: 13px 16px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px; font-weight: 300; color: #0A0A0A;
  background: #F8FAFC; border: 1px solid #E2E8F0;
  outline: none; margin-bottom: 12px;
  border-radius: 6px;
  -webkit-appearance: none;
  transition: border-color 0.18s, box-shadow 0.18s;
}
.auth-field:focus {
  border-color: #3B82F6;
  box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
}
.auth-field::placeholder { color: #64748B; }

.auth-btn-primary {
  display: block; width: 100%;
  padding: 14px 20px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px; font-weight: 600;
  color: #fff; background: #2260CC;
  border: none; border-radius: 8px; cursor: pointer;
  margin-bottom: 12px; letter-spacing: 0.01em;
  transition: background 0.18s, transform 0.12s;
}
.auth-btn-primary:hover { background: #1A52B8; }
.auth-btn-primary:active { transform: scale(0.99); }

.auth-btn-social {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%; padding: 13px 20px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13.5px; font-weight: 400; color: #374151;
  background: #fff; border: 1px solid #E2E8F0;
  border-radius: 8px; cursor: pointer; margin-bottom: 12px;
  transition: border-color 0.18s, box-shadow 0.18s;
  text-decoration: none;
}
.auth-btn-social:hover { border-color: #CBD5E1; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.auth-social-icon { width: 18px; height: 18px; flex-shrink: 0; }

.auth-agree {
  display: flex; align-items: flex-start; gap: 10px;
  margin-bottom: 16px;
  font-family: 'DM Sans', sans-serif;
  font-size: 12.5px; font-weight: 300; color: #64748B; line-height: 1.6;
}
.auth-agree input[type="checkbox"] { margin-top: 2px; accent-color: #1452CC; flex-shrink: 0; }
.auth-agree a { color: #1452CC; cursor: pointer; }

.error-box {
  background: rgba(239,68,68,0.06); border-left: 2px solid #EF4444;
  padding: 11px 14px; margin-bottom: 16px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px; color: #DC2626; display: none;
}
.error-box.visible { display: block; }

.auth-footer-link {
  font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 300; color: #64748B; text-align: center;
  margin-top: 18px;
}
.auth-footer-link a { color: #2563EB; font-weight: 500; cursor: pointer; text-decoration: none; }
.auth-footer-link a:hover { text-decoration: underline; }

.auth-divider {
  display: flex; align-items: center; gap: 14px; margin: 16px 0;
}
.auth-divider-line { flex: 1; height: 1px; background: #E2E8F0; }
.auth-divider-text {
  font-family: 'DM Sans', sans-serif;
  font-size: 11px; font-weight: 500; letter-spacing: 0.08em;
  text-transform: uppercase; color: #94A3B8;
}

/* Password strength */
.pw-strength { margin-top:-6px; margin-bottom:14px; }
.pw-strength-bar { height:4px; border-radius:2px; background:rgba(0,0,0,0.06); overflow:hidden; margin-bottom:8px; }
.pw-strength-fill { height:100%; width:0; border-radius:2px; transition:width 0.3s, background 0.3s; }
.pw-strength-fill.weak { width:25%; background:#EF4444; }
.pw-strength-fill.fair { width:50%; background:#F59E0B; }
.pw-strength-fill.good { width:75%; background:#10B981; }
.pw-strength-fill.strong { width:100%; background:#059669; }
.pw-reqs { list-style:none; margin:0; padding:0; display:grid; grid-template-columns:1fr 1fr; gap:3px 12px; }
.pw-reqs li { font-family:'DM Sans', sans-serif; font-size:11px; font-weight:400; color:#94A3B8; display:flex; align-items:center; gap:5px; transition:color 0.2s; }
.pw-reqs li.met { color:#10B981; }
.pw-reqs li .pw-icon { font-size:10px; }
</style>
</head>
<body>
<div class="auth-layout">
  <div class="auth-brand">
    <div class="auth-brand-glow"></div>
    <div class="auth-brand-top">
      <a href="/"><img src="/logo-white-sm.png" alt="Davincii" class="auth-brand-logo" style="height:26px"></a>
      <a class="auth-brand-back" href="/">&larr; Back to site</a>
    </div>
    <div class="auth-brand-bottom">
      <div class="auth-brand-rule"></div>
      <div class="auth-brand-tagline">$0 upfront.<br><em>100% yours.</em></div>
      <div class="auth-brand-sub">No registration fees, no monthly plans. We take a commission only on what we collect — nothing more.</div>
    </div>
  </div>

  <div class="auth-form-panel">
    <div class="auth-form-inner">
      <div class="auth-page-title">Get <em>started.</em></div>

      <div class="error-box" id="signup-error"></div>

      <a class="auth-btn-social" href="/api/auth/google">
        <svg class="auth-social-icon" viewBox="0 0 18 18"><path d="M17.64 9.205c0-.639-.057-1.252-.164-1.841H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/><path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
        Continue with Google
      </a>

      <div class="auth-divider">
        <div class="auth-divider-line"></div>
        <span class="auth-divider-text">or</span>
        <div class="auth-divider-line"></div>
      </div>

      <form method="POST" action="/api/auth/signup" autocomplete="on">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
          <input class="auth-field" style="margin-bottom:0" type="text" name="first_name" id="signup-first"
                 autocomplete="given-name" placeholder="First name" required>
          <input class="auth-field" style="margin-bottom:0" type="text" name="last_name" id="signup-last"
                 autocomplete="family-name" placeholder="Last name" required>
        </div>

        <input class="auth-field" type="text" name="artist_name" id="signup-artist-name"
               autocomplete="nickname" placeholder="Artist / stage name" required>

        <input class="auth-field" type="email" name="email" id="signup-email"
               autocomplete="username" placeholder="Email address" required>

        <input class="auth-field" type="password" name="password" id="signup-password"
               autocomplete="new-password" placeholder="Create a password" required minlength="8">
        <div class="pw-strength" id="sa-pw-strength" style="display:none">
          <div class="pw-strength-bar"><div class="pw-strength-fill" id="sa-pw-fill"></div></div>
          <ul class="pw-reqs">
            <li id="sa-req-len"><span class="pw-icon">&#9675;</span> 8+ characters</li>
            <li id="sa-req-upper"><span class="pw-icon">&#9675;</span> Uppercase</li>
            <li id="sa-req-lower"><span class="pw-icon">&#9675;</span> Lowercase</li>
            <li id="sa-req-num"><span class="pw-icon">&#9675;</span> Number</li>
            <li id="sa-req-special"><span class="pw-icon">&#9675;</span> Special char</li>
          </ul>
        </div>

        <input class="auth-field" type="password" name="confirm_password" id="signup-confirm"
               autocomplete="new-password" placeholder="Confirm password" required minlength="8">

        <div class="auth-agree">
          <input type="checkbox" id="tos-agree" name="tos_agree" required>
          <label for="tos-agree">I agree to Davincii's <a href="/terms" target="_blank">Terms</a> and <a href="/privacy" target="_blank">Privacy Policy</a></label>
        </div>

        <button class="auth-btn-primary" type="submit">Continue</button>
      </form>

      <div class="auth-footer-link">Already have an account? <a href="/login.html">Sign in</a></div>
    </div>
  </div>
</div>

<script>
(function() {
  // If user has a valid session, redirect to dashboard
  var savedToken = localStorage.getItem('dv_token');
  if (savedToken) {
    fetch('/api/auth/me', { headers: { 'Authorization': 'Bearer ' + savedToken } })
      .then(function(r) { if (r.ok) return r.json(); throw new Error('expired'); })
      .then(function() { window.location.replace('/dashboard'); })
      .catch(function() { localStorage.removeItem('dv_token'); localStorage.removeItem('dv_artist'); });
  }

  var params = new URLSearchParams(window.location.search);
  var error = params.get('error');
  if (error) {
    var el = document.getElementById('signup-error');
    el.textContent = error;
    el.classList.add('visible');
    window.history.replaceState({}, '', '/signup.html');
  }

  // Client-side password match check before submit
  var form = document.querySelector('form');
  form.addEventListener('submit', function(e) {
    var pw = document.getElementById('signup-password').value;
    var confirm = document.getElementById('signup-confirm').value;
    if (pw !== confirm) {
      e.preventDefault();
      var el = document.getElementById('signup-error');
      el.textContent = 'Passwords do not match.';
      el.classList.add('visible');
    }
  });

  // Password strength
  var pwInput = document.getElementById('signup-password');
  if (pwInput) {
    pwInput.addEventListener('input', function() {
      var v = this.value;
      var wrap = document.getElementById('sa-pw-strength');
      var fill = document.getElementById('sa-pw-fill');
      wrap.style.display = v.length > 0 ? 'block' : 'none';
      var hasLen = v.length >= 8, hasUpper = /[A-Z]/.test(v), hasLower = /[a-z]/.test(v), hasNum = /[0-9]/.test(v), hasSpecial = /[^A-Za-z0-9]/.test(v);
      function setReq(id, met) { var el = document.getElementById(id); el.classList.toggle('met', met); el.querySelector('.pw-icon').textContent = met ? '\u2713' : '\u25CB'; }
      setReq('sa-req-len', hasLen); setReq('sa-req-upper', hasUpper); setReq('sa-req-lower', hasLower); setReq('sa-req-num', hasNum); setReq('sa-req-special', hasSpecial);
      var score = [hasLen, hasUpper, hasLower, hasNum, hasSpecial].filter(Boolean).length;
      fill.className = 'pw-strength-fill';
      if (score <= 1) fill.classList.add('weak');
      else if (score <= 2) fill.classList.add('fair');
      else if (score <= 3) fill.classList.add('good');
      else fill.classList.add('strong');
    });
  }
})();
</script>
</body>
</html>
