<!DOCTYPE html>
<html lang="en" style="background:#F0F4FA">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#F0F4FA">
<title>Davincii</title>
<style>
html,body{margin:0;background:#F0F4FA;min-height:100vh;display:flex;align-items:center;justify-content:center}
.loader{width:28px;height:28px;border:3px solid #E2E8F0;border-top-color:#2260CC;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<!-- Safari requires the page to render before it triggers "Save Password".
     A visible body + short delay ensures the credential-save prompt fires. -->
<div class="loader"></div>
<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var artistParam = params.get('artist');
  var isSignup = params.get('signup') === '1';

  if (artistParam) {
    try {
      var artist = JSON.parse(decodeURIComponent(artistParam));
      // Auth token now lives in HttpOnly cookie; only cache artist for UI display
      localStorage.setItem('dv_artist', JSON.stringify(artist));
      if (isSignup) {
        localStorage.setItem('dv_just_signed_up', '1');
      }
    } catch (e) {
      window.location.replace('/login');
      return;
    }
    var qs = '?artist=' + encodeURIComponent(artistParam);
    if (isSignup) { qs += '&signup=1'; }
    if (params.get('google_signup') === '1') { qs += '&google_signup=1'; }
    // Short delay so Safari's password manager detects the successful
    // POST → 302 → page-render cycle and offers to save credentials
    setTimeout(function() { window.location.replace('/' + qs); }, 200);
  } else {
    window.location.replace('/login');
  }
})();
</script>
</body>
</html>
