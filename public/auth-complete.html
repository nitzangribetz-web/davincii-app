<!DOCTYPE html>
<html lang="en" style="background:#F0F4FA">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#F0F4FA">
<title>Davincii</title>
<style>html,body{margin:0;background:#F0F4FA;min-height:100vh}</style>
<script>
// Runs in <head> — redirects BEFORE body renders, so nothing is ever visible.
// This page exists only so Safari detects the form POST → 302 → navigation
// cycle and offers to save credentials to iCloud Keychain.
(function() {
  var params = new URLSearchParams(window.location.search);
  var token = params.get('token');
  var artistParam = params.get('artist');
  var isSignup = params.get('signup') === '1';

  if (token && artistParam) {
    try {
      var artist = JSON.parse(decodeURIComponent(artistParam));
      localStorage.setItem('dv_token', token);
      localStorage.setItem('dv_artist', JSON.stringify(artist));
      if (isSignup) {
        localStorage.setItem('dv_just_signed_up', '1');
      }
    } catch (e) {
      window.location.replace('/login');
      return;
    }
    var qs = '?token=' + encodeURIComponent(token) + '&artist=' + encodeURIComponent(artistParam);
    if (isSignup) { qs += '&signup=1'; }
    if (params.get('google_signup') === '1') { qs += '&google_signup=1'; }
    window.location.replace('/' + qs);
  } else {
    window.location.replace('/login');
  }
})();
</script>
</head>
<body></body>
</html>
