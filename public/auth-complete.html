<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Davincii</title>
<style>
body { margin:0; background:#F0F4FA; }
.auth-loading {
  display:flex; align-items:center; justify-content:center;
  height:100vh; font-family:'DM Sans',system-ui,sans-serif;
  color:#64748B; font-size:14px; font-weight:300;
}
.auth-loading-dot { display:inline-block; width:6px; height:6px; border-radius:50%;
  background:#3B82F6; margin:0 3px; animation:pulse 1.2s ease-in-out infinite; }
.auth-loading-dot:nth-child(2) { animation-delay:0.15s; }
.auth-loading-dot:nth-child(3) { animation-delay:0.3s; }
@keyframes pulse { 0%,80%,100%{opacity:0.3;transform:scale(0.8)} 40%{opacity:1;transform:scale(1)} }
</style>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
<div class="auth-loading">
  <span class="auth-loading-dot"></span>
  <span class="auth-loading-dot"></span>
  <span class="auth-loading-dot"></span>
</div>

<script>
// This page loads after a real form POST + 302 redirect.
// Safari has already seen the full form submission + navigation cycle,
// so it will offer to save the credentials to iCloud Keychain.
//
// Now we store the auth token and redirect into the app.
(function() {
  var params = new URLSearchParams(window.location.search);
  var token = params.get('token');
  var artistParam = params.get('artist');
  var isSignup = params.get('signup') === '1';

  if (token && artistParam) {
    try {
      var artist = JSON.parse(decodeURIComponent(artistParam));
      localStorage.setItem('dv_token', token);
      localStorage.setItem('dv_artist', JSON.stringify(artist));
      if (isSignup) {
        localStorage.setItem('dv_just_signed_up', '1');
      }
    } catch (e) {
      window.location.replace('/login.html');
      return;
    }
    var qs = '?token=' + encodeURIComponent(token) + '&artist=' + encodeURIComponent(artistParam);
    if (isSignup) { qs += '&signup=1'; }
    window.location.replace('/' + qs);
  } else {
    window.location.replace('/login.html');
  }
})();
</script>
</body>
</html>
